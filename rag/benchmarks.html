    border: 1px solid var(--border);

    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

    qa: "수백~수천 개 (합성)", qaNum: 1500,
    usageKey: "all-use", usage: "전체",
    domain: "Synthetic needle-in-haystack",
    venue: "arXiv", venueKey: "arxiv",
    domainKey: "general",
    note: "Evaluates extremely long contexts. Modular or black-box approach",
  },
  {
    num: 26, name: "SCARF", year: "2025.04", yearNum: 202504,
    dataset: "(User-provided)",
    qa: "가변 (user-provided)", qaNum: -1,
    usageKey: "framework", usage: "프레임워크",
    domain: "Generic multi-domain",
    venue: "arXiv", venueKey: "arxiv",
    domainKey: "general",
    note: "Modular / black-box approach. Integrates wide metrics (LLM judge)",
  },
];

function getQaClass(num) {
  if (num === -1)  return 'qa-var';   // framework/variable
  if (num === -2)  return 'qa-var';   // unknown
  if (num < 500)   return 'qa-sm';
  if (num < 2000)  return 'qa-md';
  if (num < 10000) return 'qa-lg';
  return 'qa-xl';
}
function getUsageBadge(key) {
  const map = {
    'all-use':   ['badge-all',  '전체 사용'],
    'part':      ['badge-part', '일부 사용'],
    'framework': ['badge-fw',   '프레임워크'],
    'var':       ['badge-var',  '가변'],
  };
  const [cls, label] = map[key] || ['badge-var', key];
  return `<span class="badge ${cls}">${label}</span>`;
}
function getVenueTag(key, text) {
  return `<span class="venue-tag venue-${key}">${text}</span>`;
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => `
    <tr data-usage="${r.usageKey}" data-domain="${r.domainKey}">
      <td class="col-num">${r.num}</td>
      <td class="col-name">${r.name}</td>
      <td class="col-year">${r.year}</td>
      <td class="col-domain" style="font-size:12px;color:var(--text-dim)">${r.dataset}</td>
      <td class="col-qa ${getQaClass(r.qaNum)}">${r.qa}</td>
      <td class="col-usage">${getUsageBadge(r.usageKey)}</td>
      <td class="col-domain">${r.domain}</td>
      <td class="col-venue">${getVenueTag(r.venueKey, r.venue)}</td>
      <td class="col-note">${r.note}</td>
    </tr>
  `).join('');
}

// initial render
let currentData = [...data];
renderTable(currentData);

// sort state
let sortCol = null, sortAsc = true;

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    document.querySelectorAll('thead th').forEach(t => {
      t.classList.remove('sorted-asc','sorted-desc');
      const icon = t.querySelector('.sort-icon');
      if (icon) icon.textContent = '↕';
    });
    th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = sortAsc ? '↑' : '↓';

    currentData.sort((a, b) => {
      let va, vb;
      if (col === 'num')    { va = a.num;    vb = b.num; }
      else if (col === 'year')   { va = a.yearNum; vb = b.yearNum; }
      else if (col === 'qa')     { va = a.qaNum;   vb = b.qaNum; }
      else if (col === 'name')   { va = a.name;    vb = b.name; }
      else if (col === 'usage')  { va = a.usageKey; vb = b.usageKey; }
      else if (col === 'venue')  { va = a.venue;    vb = b.venue; }
      else if (col === 'dataset'){ va = a.dataset;  vb = b.dataset; }
      else if (col === 'domain') { va = a.domain;   vb = b.domain; }
      else if (col === 'note')   { va = a.note;     vb = b.note; }
      else return 0;
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ?  1 : -1;
      return 0;
    });
    renderTable(currentData);
    applyFilters();
  });
});

// filter & search
let activeFilter = 'all';

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.querySelectorAll('#tableBody tr');
  let visible = 0;
  rows.forEach(row => {
    const usage = row.dataset.usage;
    const domain = row.dataset.domain;
    const text = row.textContent.toLowerCase();

    const filterMatch =
      activeFilter === 'all' ||
      (activeFilter === 'all-use' && usage === 'all-use') ||
      (activeFilter === 'part'    && usage === 'part') ||
      (activeFilter === 'framework' && usage === 'framework') ||
      (activeFilter === 'domain'  && domain === 'domain');

    const searchMatch = !query || text.includes(query);

    if (filterMatch && searchMatch) { row.classList.remove('hidden'); visible++; }
    else row.classList.add('hidden');
  });
  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
</script>
</body>
</html>
